# GitHub Secret Scanning + Push Protection configuration.
#
# detector.test.ts is the corpus that exercises the extension's
# four-layer detection engine. It contains realistic-shaped provider
# key prefixes (Stripe, Slack, Azure, GitHub PAT, AWS, etc.) that are
# *intentionally synthetic* — placeholder values like
# "sk_live_abcdefghijklmnopqrstuvwx" that match the secret format the
# detector is meant to catch, but are not real credentials. Without
# this exclusion every contribution to the test corpus would trigger
# false-positive push-protection blocks.
#
# Source files (src/**/*.ts excluding the test) are NOT excluded —
# they should never contain a real secret either.
paths-ignore:
  - "src/content/detector.test.ts"
